name: Dev Docker Images

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron:  '0 3 * * 1'

jobs:
  docker-build:
    name: ${{ matrix.runner }}
    strategy:
      matrix:
        # ubuntu-latest leverages larger GH runner pool & completes in ~30s instead of ~3m
        runner: [ubuntu-latest, ubicloud-standard-2, ubicloud-standard-4, ubicloud-standard-8, ubicloud-standard-16, ubicloud-standard-30]
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Show cpu info
        run: lscpu

      - name: generate or hydrate protos
        uses: ./.github/actions/genprotos

      - name: Set Short Commit Hash
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build (optionally publish) PeerDB Images
        uses: docker/bake-action@v5
        with:
          files: ./docker-bake.hcl
          push: false
        env:
          SHA_SHORT: dev-${{ steps.vars.outputs.sha_short }}
          TAG: latest-dev
